    <line class="pane" x1="55" y1="325" x2="55" y2="460"/>
    <line class="pane" x1="-110" y1="392" x2="110" y2="392"/>
    <path class="pane" d="M -72,325 C -50,280 -26,235 0,208"/>
    <path class="pane" d="M 72,325 C 50,280 26,235 0,208"/>
