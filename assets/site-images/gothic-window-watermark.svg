    <path class="stone" d="M -132,460 L -132,260 C -132,126 -66,70 0,58 C 66,70 132,126 132,260 L 132,460" stroke-width="8"/>
    <path class="stone2" d="M -120,460 L -120,263 C -120,136 -60,80 0,70 C 60,80 120,136 120,263 L 120,460" stroke-width="2.5"/>
    <path class="gold" d="M -110,460 L -110,265 C -110,145 -55,90 0,80 C 55,90 110,145 110,265 L 110,460" stroke-width="1.8"/>
    <line class="gold" x1="0" y1="460" x2="0" y2="198" stroke-width="1.2"/>
    <line class="gold" x1="-110" y1="325" x2="110" y2="325" stroke-width="1"/>
    <path class="gold" d="M -110,325 C -78,255 -32,222 0,198" stroke-width="1"/>
